<!DOCTYPE html>
<html>

<head>
    <title>Smart Data System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
        {% if error %}
        <div class="bg-red-100 text-red-700 p-2 rounded mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="bg-green-100 text-green-700 p-2 rounded mb-4 text-center">
            {{ success }}
        </div>
        {% endif %}
        <form id="signupForm" action="/submit" method="POST" enctype="multipart/form-data" class="space-y-4">

            <input name="name" placeholder="Name" class="w-full p-2 border rounded-lg" required>

            <input name="email" placeholder="Email" class="w-full p-2 border rounded-lg" required>

            <input name="phone" placeholder="Phone" class="w-full p-2 border rounded-lg" required>

            <input type="password" name="password" placeholder="Password" class="w-full p-2 border rounded-lg" required>

            <input type="file" name="file" class="w-full p-2 border rounded-lg">

            <select name="dataset_choice" class="w-full p-2 border rounded-lg" aria-label="Dataset choice">
                <option value="">-- Optional: Use sample dataset (no upload) --</option>
                <option value="sample.csv">sample.csv</option>
                <option value="urbanthreads_q4.csv">urbanthreads_q4.csv</option>
            </select>

            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                Submit
            </button>

        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
